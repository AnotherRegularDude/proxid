[server]
host = "127.0.0.1"
port = 8800

[provider]
base_url = "https://openrouter.ai/api/v1"
default_transcription_model = "openai/whisper-large-v3-turbo"
default_speech_model = "google/gemini-3.1-flash-tts-preview"
request_timeout_secs = 60

[audio]
pcm_sample_rate = 24000
stt_sample_rate = 44100

aac_bitrate_bps = 160000
mp3_bitrate_bps = 128000
opus_bitrate_bps = 64000

[logging]
filter = "proxid=debug,tower_http=info"
